name: careshare
description: CareShare 2.0 — care coordination (Flutter + Firebase).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  go_router: ^17.2.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  google_sign_in: ^7.2.0
  file_picker: ^8.1.4
  url_launcher: ^6.3.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  http: ^1.6.0
  table_calendar: ^3.2.0
  shared_preferences: ^2.3.3
  cloud_functions: ^6.2.0
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/avatars/
    - assets/images/CareShareLogo50.jpg
    - assets/images/CareShareLogo75.jpg
    - assets/images/CareShareLogo100.jpg
    - assets/images/CareShareLogo500.jpg
    - assets/images/CareShareInverted.png
    - assets/images/CareShareInvertedFilled.png
    - assets/images/CareShareMark.png
